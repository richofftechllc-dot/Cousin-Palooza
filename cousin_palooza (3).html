<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cousin Palooza 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F4C430;
    --dark: #111;
    --card: #1a1a1a;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --adult: #4ade80;
    --kid: #60a5fa;
    --free: #f472b6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100%;
  }

  body {
    padding-bottom: 100px;
  }

  header {
    background: linear-gradient(135deg, #1a1200 0%, #111 60%);
    border-bottom: 3px solid var(--gold);
    padding: 24px 16px 16px;
    text-align: center;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3.2rem);
    letter-spacing: 3px;
    color: var(--gold);
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 6px;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.adult { background: var(--adult); }
  .dot.kid { background: var(--kid); }
  .dot.free { background: var(--free); }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 14px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 2px;
    color: var(--gold);
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .group-card.complete { border-color: #2a4a2a; }

  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    gap: 8px;
    min-height: 54px;
  }

  .group-name {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
    color: var(--text);
  }

  .group-status {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .group-status.done { color: var(--adult); }

  .chevron {
    width: 18px; height: 18px;
    transition: transform 0.25s;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .group-card.open .chevron { transform: rotate(180deg); }

  .group-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 1px solid var(--border);
  }

  .group-card.open .group-body { display: block; }

  .person-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1e1e1e;
    gap: 8px;
  }

  .person-row:last-child { border-bottom: none; }

  .person-name {
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }

  .person-name small {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .age-selector {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }

  .age-btn {
    border: none;
    border-radius: 8px;
    padding: 7px 9px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    background: #2a2a2a;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.2;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .age-btn.selected-adult { background: var(--adult); color: #000; }
  .age-btn.selected-kid { background: var(--kid); color: #000; }
  .age-btn.selected-free { background: var(--free); color: #000; }

  .sticky-total {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #151515;
    border-top: 2px solid var(--gold);
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
    gap: 20px;
    z-index: 200;
  }

  .total-item { text-align: center; }

  .total-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    line-height: 1;
  }

  .total-num.adult { color: var(--adult); }
  .total-num.kid { color: var(--kid); }
  .total-num.free { color: var(--free); }
  .total-num.money { color: var(--gold); }

  .total-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .divider { width: 1px; background: var(--border); }

  .action-area {
    margin: 28px 0 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .done-btn {
    display: block;
    background: var(--gold);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 3px;
    padding: 16px 40px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    max-width: 320px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .done-btn:disabled { opacity: 0.5; }

  .warning-msg {
    font-size: 0.78rem;
    color: #f97316;
    text-align: center;
    display: none;
  }

  .success-msg {
    font-size: 0.85rem;
    color: var(--adult);
    text-align: center;
    display: none;
    line-height: 1.5;
  }

  .output-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 0.75rem;
    color: var(--text);
    white-space: pre-wrap;
    line-height: 1.6;
    margin-top: 10px;
    display: none;
    font-family: monospace;
    max-height: 260px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    width: 100%;
  }

  .copy-btn {
    background: #2a2a2a;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    display: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 320px;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px 0 0;
  }

  .progress-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<header>
  <h1>🎉 Cousin Palooza</h1>
  <p>July 11, 2025 · Washington, DC · Select age category for each person</p>
  <div class="legend">
    <span class="legend-item"><span class="dot adult"></span> Adult 18+ · $100</span>
    <span class="legend-item"><span class="dot kid"></span> Kid 5–17 · $65</span>
    <span class="legend-item"><span class="dot free"></span> 4 & Under · FREE</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
</header>

<div class="container" id="app"></div>

<div class="sticky-total">
  <div class="total-item">
    <div class="total-num adult" id="totalAdults">0</div>
    <div class="total-label">Adults</div>
  </div>
  <div class="divider"></div>
  <div class="total-item">
    <div class="total-num kid" id="totalKids">0</div>
    <div class="total-label">Kids</div>
  </div>
  <div class="divider"></div>
  <div class="total-item">
    <div class="total-num free" id="totalFree">0</div>
    <div class="total-label">Free</div>
  </div>
  <div class="divider"></div>
  <div class="total-item">
    <div class="total-num money" id="totalMoney">$0</div>
    <div class="total-label">Total Due</div>
  </div>
</div>

<script>
var groups = [
  { primary: "Riq", members: ["Riq", "KaTina Williams"] },
  { primary: "Antwoin Roper", members: ["Antwoin Roper"] },
  { primary: "Ranette", members: ["Ranette", "Al"] },
  { primary: "Shalverri", members: ["Shalverri"] },
  { primary: "Patrick Robinson", members: ["Patrick Robinson", "Shontay Robinson", "Patrick Robinson (child)"] },
  { primary: "Will", members: ["Will", "Deirdre", "Sabien"] },
  { primary: "Khalil", members: ["Khalil"] },
  { primary: "Raina Pritchard", members: ["Raina Pritchard", "William Pritchard", "Islynd Pritchard", "Rayne Pritchard", "Oshyn Pritchard", "Wynter Pritchard"] },
  { primary: "Indi", members: ["Indi", "Rosie", "Cora", "Corine"] },
  { primary: "A'Zahnay", members: ["A'Zahnay"] },
  { primary: "Dorian", members: ["Dorian", "Amari", "A'Zanay", "Brielle", "Breon", "Braxton"] },
  { primary: "Priscilla Scott", members: ["Priscilla Scott"] },
  { primary: "Rambo", members: ["Rambo"] },
  { primary: "Orielle", members: ["Orielle", "Mulan"] },
  { primary: "Kiyara", members: ["Kiyara", "Ziggy", "Miya"] },
  { primary: "Tacuma", members: ["Tacuma"] },
  { primary: "Jasmin Lane", members: ["Jasmin Lane", "Justin"] },
  { primary: "Mattie", members: ["Mattie", "Yanni", "Averi"] },
  { primary: "Shique", members: ["Shique"] },
  { primary: "Rosa Scott", members: ["Rosa Scott"] },
  { primary: "Takeya", members: ["Takeya", "Jamel", "April", "Aaron", "Jassir"] },
  { primary: "Tarika", members: ["Tarika", "Javeah Chamblee", "Tylik Johnson", "Sanaa Johnson", "Makayla Johnson", "Stephen Quintero"] },
  { primary: "Sazja", members: ["Sazja"] },
  { primary: "Ky'ell", members: ["Ky'ell", "Madelyn Corto"] },
  { primary: "Jay Dubb", members: ["Jay Dubb", "Ebony", "Dominique"] }
];

var maybeGroups = [
  { primary: "Altravise Buskey", members: ["Altravise Buskey", "Richard Buskey", "Tijuan Rock", "Ryemes Buskey", "Kim Rock"] },
  { primary: "Trice R", members: ["Trice R"] },
  { primary: "Tae", members: ["Tae", "Sekai"] },
  { primary: "Ilyasah", members: ["Ilyasah"] },
  { primary: "Jabari", members: ["Jabari", "Karina Guerna", "Jabari Jr"] }
];

var state = {};

function personKey(gIdx, mi) {
  return gIdx + '-' + mi;
}

function renderGroups(groupList, startIdx, container) {
  for (var gi = 0; gi < groupList.length; gi++) {
    (function(gi) {
      var group = groupList[gi];
      var gIdx = startIdx + gi;

      var card = document.createElement('div');
      card.className = 'group-card';
      card.id = 'group-' + gIdx;

      var header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML =
        '<div class="group-name">' + group.primary + '</div>' +
        '<div class="group-status" id="status-' + gIdx + '">' + group.members.length + ' person' + (group.members.length > 1 ? 's' : '') + '</div>' +
        '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';

      var body = document.createElement('div');
      body.className = 'group-body';

      for (var mi = 0; mi < group.members.length; mi++) {
        (function(mi) {
          var name = group.members[mi];
          var key = personKey(gIdx, mi);
          state[key] = null;

          var row = document.createElement('div');
          row.className = 'person-row';

          var nameDiv = document.createElement('div');
          nameDiv.className = 'person-name';
          nameDiv.innerHTML = name + '<small>' + (mi === 0 ? 'Primary' : 'Guest') + '</small>';

          var sel = document.createElement('div');
          sel.className = 'age-selector';

          var types = [
            { type: 'adult', label: '18+<br>$100' },
            { type: 'kid',   label: '5–17<br>$65' },
            { type: 'free',  label: '4&under<br>FREE' }
          ];

          types.forEach(function(t) {
            var btn = document.createElement('button');
            btn.className = 'age-btn';
            btn.dataset.key = key;
            btn.dataset.type = t.type;
            btn.innerHTML = t.label;
            btn.addEventListener('click', function() {
              selectAge(key, t.type, gIdx);
            });
            sel.appendChild(btn);
          });

          row.appendChild(nameDiv);
          row.appendChild(sel);
          body.appendChild(row);
        })(mi);
      }

      card.appendChild(header);
      card.appendChild(body);
      container.appendChild(card);

      header.addEventListener('click', function() { toggleCard(card); });
    })(gi);
  }
}

function toggleCard(card) {
  var isOpen = card.classList.contains('open');
  var openCards = document.querySelectorAll('.group-card.open');
  for (var i = 0; i < openCards.length; i++) openCards[i].classList.remove('open');
  if (!isOpen) card.classList.add('open');
}

function selectAge(key, type, gIdx) {
  state[key] = type;
  var btns = document.querySelectorAll('[data-key="' + key + '"]');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('selected-adult', 'selected-kid', 'selected-free');
    if (btns[i].dataset.type === type) btns[i].classList.add('selected-' + type);
  }
  updateGroupStatus(gIdx);
  updateTotals();
}

function updateGroupStatus(gIdx) {
  var keys = Object.keys(state).filter(function(k) { return k.indexOf(gIdx + '-') === 0; });
  var filled = keys.filter(function(k) { return state[k] !== null; }).length;
  var statusEl = document.getElementById('status-' + gIdx);
  var card = document.getElementById('group-' + gIdx);
  if (filled === keys.length) {
    statusEl.textContent = '✓ Done';
    statusEl.classList.add('done');
    card.classList.add('complete');
  } else {
    statusEl.textContent = filled + '/' + keys.length + ' selected';
    statusEl.classList.remove('done');
    card.classList.remove('complete');
  }
}

function updateTotals() {
  var adults = 0, kids = 0, free = 0;
  var vals = Object.values(state);
  for (var i = 0; i < vals.length; i++) {
    if (vals[i] === 'adult') adults++;
    else if (vals[i] === 'kid') kids++;
    else if (vals[i] === 'free') free++;
  }
  document.getElementById('totalAdults').textContent = adults;
  document.getElementById('totalKids').textContent = kids;
  document.getElementById('totalFree').textContent = free;
  document.getElementById('totalMoney').textContent = '$' + (adults * 100 + kids * 65).toLocaleString();

  var filled = vals.filter(function(v) { return v !== null; }).length;
  document.getElementById('progressBar').style.width = (filled / vals.length * 100) + '%';
}

function generateSummary() {
  var allGroups = groups.concat(maybeGroups);
  var lines = ['COUSIN PALOOZA — July 11 Age Summary\n'];
  var adults = 0, kids = 0, free = 0;

  for (var gi = 0; gi < allGroups.length; gi++) {
    var group = allGroups[gi];
    var gIdx = gi < groups.length ? gi : groups.length + (gi - groups.length);
    var keys = Object.keys(state).filter(function(k) { return k.indexOf(gIdx + '-') === 0; });
    var anyFilled = keys.some(function(k) { return state[k] !== null; });
    if (!anyFilled) continue;

    lines.push('📋 ' + group.primary + "'s Group:");
    for (var mi = 0; mi < group.members.length; mi++) {
      var key = personKey(gIdx, mi);
      var v = state[key];
      var label = v === 'adult' ? '18+ ($100)' : v === 'kid' ? '5-17 ($65)' : v === 'free' ? '4&under (FREE)' : '—';
      if (v === 'adult') adults++;
      else if (v === 'kid') kids++;
      else if (v === 'free') free++;
      lines.push('  • ' + group.members[mi] + ': ' + label);
    }
    lines.push('');
  }

  lines.push('TOTALS:');
  lines.push('Adults (18+): ' + adults + ' x $100 = $' + (adults * 100));
  lines.push('Kids (5-17): ' + kids + ' x $65 = $' + (kids * 65));
  lines.push('Free (4&under): ' + free);
  lines.push('TOTAL DUE: $' + (adults * 100 + kids * 65));
  return lines.join('\n');
}

// Build DOM
var app = document.getElementById('app');

var goingLabel = document.createElement('div');
goingLabel.className = 'section-label';
goingLabel.textContent = '✅ GOING (62)';
app.appendChild(goingLabel);
renderGroups(groups, 0, app);

var maybeLabel = document.createElement('div');
maybeLabel.className = 'section-label';
maybeLabel.textContent = '🤔 MAYBE (12)';
app.appendChild(maybeLabel);
renderGroups(maybeGroups, groups.length, app);

var actionArea = document.createElement('div');
actionArea.className = 'action-area';

var warningMsg = document.createElement('div');
warningMsg.className = 'warning-msg';

var doneBtn = document.createElement('button');
doneBtn.className = 'done-btn';
doneBtn.textContent = "🎉 I'm Done!";

var successMsg = document.createElement('div');
successMsg.className = 'success-msg';

var copyBtn = document.createElement('button');
copyBtn.className = 'copy-btn';
copyBtn.textContent = '📋 COPY SUMMARY';

var outputBox = document.createElement('pre');
outputBox.className = 'output-box';

actionArea.appendChild(warningMsg);
actionArea.appendChild(doneBtn);
actionArea.appendChild(successMsg);
actionArea.appendChild(copyBtn);
actionArea.appendChild(outputBox);
app.appendChild(actionArea);

doneBtn.addEventListener('click', function() {
  var vals = Object.values(state);
  var filled = vals.filter(function(v) { return v !== null; }).length;
  if (filled === 0) {
    warningMsg.textContent = '⚠️ Please select an age category for at least one person.';
    warningMsg.style.display = 'block';
    return;
  }

  var allGroups2 = groups.concat(maybeGroups);
  var incomplete = [];
  for (var gi = 0; gi < allGroups2.length; gi++) {
    var gIdx = gi < groups.length ? gi : groups.length + (gi - groups.length);
    var keys = Object.keys(state).filter(function(k) { return k.indexOf(gIdx + '-') === 0; });
    var anyFilled = keys.some(function(k) { return state[k] !== null; });
    var allFilled = keys.every(function(k) { return state[k] !== null; });
    if (anyFilled && !allFilled) incomplete.push(allGroups2[gi].primary);
  }

  if (incomplete.length > 0) {
    warningMsg.textContent = '⚠️ Incomplete groups: ' + incomplete.join(', ');
    warningMsg.style.display = 'block';
    return;
  }

  warningMsg.style.display = 'none';

  var summary = generateSummary();
  outputBox.textContent = summary;
  outputBox.style.display = 'block';
  copyBtn.style.display = 'block';
  successMsg.innerHTML = 'Your info is ready! ✉️<br>Tap the button below to copy, then text or email it.';
  successMsg.style.display = 'block';

  var subject = encodeURIComponent('Cousin Palooza — Age Info Submitted');
  var bodyText = encodeURIComponent(summary);
  window.location.href = 'mailto:richofftechllc@gmail.com?subject=' + subject + '&body=' + bodyText;

  doneBtn.textContent = '✅ Submitted!';
  doneBtn.disabled = true;
  setTimeout(function() {
    doneBtn.textContent = "🎉 I'm Done!";
    doneBtn.disabled = false;
  }, 3000);
});

copyBtn.addEventListener('click', function() {
  var text = outputBox.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      copyBtn.textContent = '✅ COPIED!';
      setTimeout(function() { copyBtn.textContent = '📋 COPY SUMMARY'; }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    copyBtn.textContent = '✅ COPIED!';
    setTimeout(function() { copyBtn.textContent = '📋 COPY SUMMARY'; }, 2000);
  }
});
</script>
</body>
</html>
